server:
  port: ${DELIVERY_SERVICE_PORT:8090}

spring:
  application:
    name: x-delivery-service
  profiles:
    default: local

x:
  http:
    logging:
      enabled: true
      server: x-delivery-service
      hop: "x-api-gateway → x-bff → x-delivery-service"
      hops:
        /api/v1/deliveries: "x-api-gateway → x-bff → x-delivery-service"
